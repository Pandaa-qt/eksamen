services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bryllup

  app:
    build: .
    restart: always
    networks:
      - bryllup
    volumes:
      - ./data:/app/data

networks:
  bryllup:
    driver: bridge